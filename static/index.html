<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Vault</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: monospace;
        overflow: hidden;
        background: #fff;
        color: #000;
      }
      #drop-zone {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        width: 100%;
      }
      .center-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 250px;
        justify-content: center;
        width: 100%;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: auto auto 1fr;
        gap: 0 10px;
        text-align: left;
        width: fit-content;
        font-weight: normal;
        margin: 0 auto;
      }
      button {
        font-family: monospace;
        background: transparent;
        border: none;
        color: #000;
        padding: 10px 15px;
        cursor: pointer;
        transition: background 0.1s;
        text-transform: lowercase;
        font-weight: bold;
      }
      button:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      a {
        color: #000;
        text-decoration: underline;
        word-break: break-all;
        font-weight: bold;
      }
      .note {
        opacity: 0.4;
        font-size: 0.8em;
        margin-top: 30px;
        text-align: center;
        font-weight: normal;
      }
      #staging, #ui, #out {
        display: none;
      }
      .actions {
        display: flex;
        justify-content: center;
        width: 100%;
        margin-top: 20px;
        gap: 10px;
      }
      input[type="password"],
      input[type="text"],
      select {
        font-family: monospace;
        padding: 8px;
        border: 1px solid #ccc;
        outline: none;
        width: 240px;
        box-sizing: border-box;
        background: #fff;
        color: #000;
        height: 35px;
        margin: 5px 0;
        text-align: center;
      }

      select {
        cursor: pointer;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        text-align-last: center;
        border-radius: 0;
      }

      input:focus,
      select:focus {
        border-color: #000;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div id="drop-zone">
      <div class="center-wrap">
        <div id="idle" style="text-align: center">
          drag drop file or<br>
          <button onclick="document.getElementById('file-input').click()">
            [ select_file ]
          </button>
        </div>

        <div id="staging" style="text-align: center">
          <div class="stat-grid">
            <span>file</span><span>:</span><span id="st-fn"></span>
            <span>size</span><span>:</span><span id="st-fs"></span>
          </div>

          <div class="input-group">
            <input
              type="text"
              id="auth-totp"
              placeholder="6-digit totp"
              maxlength="6"
              inputmode="numeric"
              pattern="[0-9]*"
              autocomplete="one-time-code"
            >
            <input
              type="password"
              id="dl-pw"
              placeholder="auth password"
              autocomplete="off"
            >
            <select id="retention-select">
              <option value="6">6 hours</option>
              <option value="24" selected>24 hours</option>
              <option value="72">3 days</option>
              <option value="168">7 days</option>
            </select>
          </div>

          <div class="actions">
            <button onclick="startUpload()">[ start_upload ]</button>
            <button onclick="resetUI()">[ cancel ]</button>
          </div>
        </div>

        <div id="ui">
          <div class="stat-grid">
            <span>file</span><span>:</span><span id="fn"></span>
            <span>size</span><span>:</span><span id="fs"></span>
            <span>prog</span><span>:</span><span>[ <span id="pc">0%</span>
              ]</span>
          </div>
          <div class="actions">
            <button onclick="if(xhr) xhr.abort(); resetUI();">
              [ abort_transfer ]
            </button>
          </div>
        </div>

        <div id="out">
          <div class="stat-grid">
            <span>link</span><span>:</span><span><a
                id="ln"
                target="_blank"
              ></a></span>
          </div>
          <div class="actions">
            <button onclick="copyUrl(this)">[ copy_link ]</button>
            <button onclick="resetUI()">[ new_upload ]</button>
          </div>
        </div>

        <div class="note">authenticated file storage</div>
      </div>
    </div>

    <input
      type="file"
      id="file-input"
      style="display: none"
      onchange="stageFile(this.files[0])"
    >

    <script>
      const zone = document.getElementById("drop-zone");
      let xhr = null;
      let pendingFile = null;

      window.ondragover = (e) => {
        e.preventDefault();
        zone.style.background = "rgba(0,0,0,0.01)";
      };
      window.ondragleave = () => {
        zone.style.background = "#fff";
      };
      window.ondrop = (e) => {
        e.preventDefault();
        zone.style.background = "#fff";
        stageFile(e.dataTransfer.files[0]);
      };

      function stageFile(file) {
        if (!file) return;
        pendingFile = file;
        document.getElementById("st-fn").textContent = file.name;
        document.getElementById("st-fs").textContent =
          (file.size / 1024 / 1024).toFixed(2) + " mb";
        document.getElementById("dl-pw").value = "";
        document.getElementById("auth-totp").value = ""; // Clear TOTP
        document.getElementById("idle").style.display = "none";
        document.getElementById("staging").style.display = "block";
        document.getElementById("auth-totp").focus(); // Focus TOTP first
      }

      function startUpload() {
        if (!pendingFile) return;
        const file = pendingFile;
        const pw = document.getElementById("dl-pw").value;
        const totp = document.getElementById("auth-totp").value; // Get TOTP
        const retentionHours =
          document.getElementById("retention-select").value;

        if (totp.length !== 6 || isNaN(totp)) {
          alert("Please enter a valid 6-digit TOTP code.");
          return;
        }

        document.getElementById("fn").textContent = file.name;
        document.getElementById("fs").textContent =
          (file.size / 1024 / 1024).toFixed(2) + " mb";
        document.getElementById("pc").textContent = "0%";
        document.getElementById("staging").style.display = "none";
        document.getElementById("ui").style.display = "block";

        xhr = new XMLHttpRequest();
        xhr.open("PUT", "/" + encodeURIComponent(file.name), true);
        xhr.setRequestHeader("X-Retention-Hour", retentionHours);

        // Uses TOTP as the 'user' part of Basic Auth
        const creds = btoa(totp + ":" + pw);
        xhr.setRequestHeader("Authorization", "Basic " + creds);

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            document.getElementById("pc").textContent =
              Math.round((e.loaded / e.total) * 100) + "%";
          }
        };

        xhr.onerror = () => {
          alert("Upload failed. Server unreachable.");
          resetUI();
        };

        xhr.onload = () => {
          if (xhr.status === 200) {
            const serverUrl = xhr.responseText.trim();
            const linkEl = document.getElementById("ln");
            linkEl.href = serverUrl;
            linkEl.textContent = serverUrl;
            document.getElementById("ui").style.display = "none";
            document.getElementById("out").style.display = "block";
          } else {
            alert(
              "Upload rejected: HTTP " + xhr.status + "\n" +
                xhr.responseText,
            );
            resetUI();
          }
        };

        xhr.send(file);
      }

      function resetUI() {
        pendingFile = null;
        document.getElementById("file-input").value = "";
        document.getElementById("idle").style.display = "block";
        document.getElementById("staging").style.display = "none";
        document.getElementById("ui").style.display = "none";
        document.getElementById("out").style.display = "none";
        document.getElementById("retention-select").value = "24";
      }

      function copyUrl(btn) {
        const link = document.getElementById("ln").href;
        navigator.clipboard.writeText(link).then(() => {
          const old = btn.textContent;
          btn.textContent = "[ copied ]";
          setTimeout(() => btn.textContent = old, 1000);
        });
      }
    </script>
  </body>
</html>
